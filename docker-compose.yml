version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cloudpulse_postgres
    environment:
      POSTGRES_USER: cloudpulse_user
      POSTGRES_PASSWORD: cloudpulse_password
      POSTGRES_DB: cloudpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudpulse_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cloudpulse_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: cloudpulse_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cloudpulse_user:cloudpulse_password@postgres:5432/cloudpulse
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      LOG_LEVEL: INFO
    volumes:
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloudpulse_network

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: cloudpulse_frontend
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - backend
    networks:
      - cloudpulse_network

  # Celery Worker (optional)
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: cloudpulse_celery
    command: celery -A celery_tasks worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://cloudpulse_user:cloudpulse_password@postgres:5432/cloudpulse
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app/backend
    depends_on:
      - postgres
      - redis
    networks:
      - cloudpulse_network
    profiles:
      - worker

volumes:
  postgres_data:
  redis_data:

networks:
  cloudpulse_network:
    driver: bridge
