name: Security & Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python dependency check
        run: |
          python -m pip install --upgrade pip safety
          if [ -f backend/requirements.txt ]; then
            safety check -r backend/requirements.txt --json || true
          fi

      - name: Node dependency check
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend
            npm audit --audit-level=moderate || true
          fi

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python code quality
        uses: Pylint-Community/pylint-community-github-action@v1.4.1
        if: hashFiles('backend/**/*.py') != ''
        with:
          python-root-list: backend

      - name: Run SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        if: secrets.SONAR_TOKEN != ''

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
