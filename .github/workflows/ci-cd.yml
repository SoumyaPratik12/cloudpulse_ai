name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cloudpulse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
            pip install -r backend/requirements-dev.txt 2>/dev/null || true
          fi

      - name: Run linting (Ruff)
        run: |
          if [ -f backend/requirements-dev.txt ]; then
            cd backend && ruff check . || true
          fi

      - name: Run type checking (Mypy)
        run: |
          if [ -f backend/requirements-dev.txt ]; then
            cd backend && mypy . --ignore-missing-imports || true
          fi

      - name: Run backend tests
        run: |
          if [ -d backend/tests ]; then
            cd backend && pytest tests/ -v --cov --cov-report=xml
          fi
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cloudpulse_test
          REDIS_URL: redis://localhost:6379/0

  frontend-tests:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm ci
          fi

      - name: Run linting (ESLint)
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run lint || true
          fi

      - name: Run type checking (TypeScript)
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run type-check || true
          fi

      - name: Build frontend
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run build
          fi

      - name: Run frontend tests
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run test || true
          fi

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    strategy:
      matrix:
        include:
          - dockerfile: docker/Dockerfile.backend
            image: cloudpulse-backend
            context: ./backend
          - dockerfile: docker/Dockerfile.frontend
            image: cloudpulse-frontend
            context: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if it does not exist
        run: |
          aws ecr describe-repositories --repository-names ${{ matrix.image }} || aws ecr create-repository --repository-name ${{ matrix.image }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.image }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  infrastructure-validation:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Validate Terraform
        run: |
          if [ -d infrastructure ]; then
            cd infrastructure
            terraform init -backend=false
            terraform validate
            terraform fmt -check -recursive . || true
          fi

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build-and-push, infrastructure-validation]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/develop'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Clean up orphaned resources
        run: |
          pip install boto3
          python infrastructure/cleanup.py
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Deploy to dev environment
        run: |
          echo "🚀 Deploying to development environment..."
          if [ -d infrastructure ]; then
            cd infrastructure
            terraform init
            terraform apply -auto-approve -var-file=dev.tfvars -var="image_tag=${{ github.sha }}"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, infrastructure-validation]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    
    environment:
      name: production
      url: http://cloudpulse-prod-alb-703445417.ap-south-1.elb.amazonaws.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Clean up orphaned resources
        run: |
          pip install boto3
          python infrastructure/cleanup.py
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1

      - name: Deploy to production environment
        run: |
          echo "🚀 Deploying to production environment..."
          if [ -d infrastructure ]; then
            cd infrastructure
            terraform init
            terraform apply -auto-approve -var-file=prod.tfvars -var="image_tag=${{ github.sha }}"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
